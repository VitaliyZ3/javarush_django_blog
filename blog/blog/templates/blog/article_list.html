{% extends 'base.html' %}
{% load static %}

{% block title %} Articles {% endblock %}

{% block body %}
    Articles for {{ time_now | date:"d M Y" }}

    {% for article in article_list %}
        <a href="{% url 'blog:article' article.pk %}"><h1>{{ article.name }}</h1></a>
        <p>{{ article.text | truncatewords:10}}</p>
        <hr>
    {% endfor %}

{% endblock %}
